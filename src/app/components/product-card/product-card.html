<p>product-card works!</p>
<li class="product-card">

    <div class="container-image">
        <img *ngIf="product?.image_url"
             class="product-image"
             [src]="product.image_url"
             [alt]="product.name">
    </div>

    <div class="product-info">
        <h3>{{ product?.name }}</h3>

        <p>{{ product?.description }}</p>

        <span class="price">
            {{ product?.price }}
        </span>
    </div>

</li>
