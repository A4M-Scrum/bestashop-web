<div class="product-container">
    <div class="container-image">
        @if (product?.image_url){
        <img class="product-image" [src]="product.image_url" [alt]="product.name">
        }

    </div>

    <div class="product-info">
        <h3>{{ product?.name }}</h3>

        <p>{{ product?.description }}</p>

        <span class="price">
            {{ product?.price }}
        </span>
    </div>
</div>
