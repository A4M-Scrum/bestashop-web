<form (ngSubmit)="onSubmit()" #loginForm="ngForm">

  @if (!currentUser) {

    <div>
      <label for="email">Correo electrónico</label>
      <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="email"
        required
      />
    </div>

    <div>
      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        name="password"
        [(ngModel)]="password"
        required
      />
    </div>

    <button type="submit">
      Acceder
    </button>

    @if (message) {
      <p [class.error]="isError">
        {{ message }}
      </p>
    }
  }

  @if (currentUser) {

    <p>
      {{ message }}
    </p>

    <button type="button" (click)="logout()">
      Cerrar sesión
    </button>
  }

</form>
