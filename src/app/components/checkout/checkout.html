<div class="checkout">

    <div class="checkout-action">
        <span class="checkout-eyebrow">Paso final</span>
        <button class="btn btn--primary checkout-btn" (click)="checkout()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16px" height="16px" fill="currentColor">
                <path d="M9,20a1,1,0,0,1-.71-.29l-5-5a1,1,0,0,1,1.42-1.42L9,17.59,19.29,7.29a1,1,0,0,1,1.42,1.42l-11,11A1,1,0,0,1,9,20Z"/>
            </svg>
            Finalizar Compra
        </button>
    </div>

    @if (ticket) {
    <div class="ticket-wrapper">
        <div class="ticket-header">
            <span class="checkout-eyebrow">Confirmación del pedido</span>
            <span class="ticket-status">OK</span>
        </div>
        <pre class="ticket">{{ ticket }}</pre>
    </div>
    }

</div>
